[build]
  command = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/krzysztof-remonty build"
  publish = "artifacts/krzysztof-remonty/dist/public"

[build.environment]
  NODE_VERSION = "22.13.0"
  PNPM_VERSION = "10.30.3"
  PNPM_FLAGS = "--no-frozen-lockfile"
  PORT = "5173"
  BASE_PATH = "/"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
